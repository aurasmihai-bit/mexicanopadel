<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0f1f0f"/>

  <!-- Grid lines subtle -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#1a3a1a" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#1a3a1a" stroke-width="1"/>

  <!-- Court lines decorative -->
  <rect x="60" y="60" width="1080" height="510" rx="8" fill="none" stroke="#1e4020" stroke-width="2"/>
  <rect x="90" y="90" width="1020" height="450" rx="6" fill="none" stroke="#1e4020" stroke-width="1" stroke-dasharray="8 6"/>

  <!-- Left accent bar -->
  <rect x="60" y="60" width="6" height="510" rx="3" fill="#639922"/>

  <!-- Racket icon group left -->
  <g transform="translate(130, 200)">
    <ellipse cx="50" cy="50" rx="38" ry="44" fill="none" stroke="#639922" stroke-width="5"/>
    <line x1="50" y1="94" x2="50" y2="140" stroke="#639922" stroke-width="5" stroke-linecap="round"/>
    <!-- strings -->
    <line x1="20" y1="30" x2="80" y2="30" stroke="#3b6d11" stroke-width="1.5"/>
    <line x1="15" y1="45" x2="85" y2="45" stroke="#3b6d11" stroke-width="1.5"/>
    <line x1="13" y1="60" x2="87" y2="60" stroke="#3b6d11" stroke-width="1.5"/>
    <line x1="15" y1="75" x2="85" y2="75" stroke="#3b6d11" stroke-width="1.5"/>
    <line x1="30" y1="10" x2="30" y2="90" stroke="#3b6d11" stroke-width="1.5"/>
    <line x1="45" y1="6" x2="45" y2="94" stroke="#3b6d11" stroke-width="1.5"/>
    <line x1="60" y1="6" x2="60" y2="94" stroke="#3b6d11" stroke-width="1.5"/>
    <line x1="70" y1="10" x2="70" y2="90" stroke="#3b6d11" stroke-width="1.5"/>
  </g>

  <!-- Main title -->
  <text x="310" y="230" font-size="78" font-weight="700" fill="#f0ede8" letter-spacing="-2">Mexicano</text>
  <text x="310" y="320" font-size="78" font-weight="700" fill="#639922" letter-spacing="-2">Padel</text>

  <!-- Subtitle -->
  <text x="310" y="385" font-size="28" fill="#a0a09a" font-weight="400">Tournament Manager</text>

  <!-- Divider -->
  <line x1="310" y1="415" x2="860" y2="415" stroke="#1e4020" stroke-width="1.5"/>

  <!-- Feature pills -->
  <g transform="translate(310, 440)">
    <!-- Pill 1 -->
    <rect x="0" y="0" width="170" height="40" rx="20" fill="#173404"/>
    <text x="85" y="26" font-size="16" fill="#c0dd97" text-anchor="middle" font-weight="500">Player Registration</text>
    <!-- Pill 2 -->
    <rect x="186" y="0" width="165" height="40" rx="20" fill="#173404"/>
    <text x="269" y="26" font-size="16" fill="#c0dd97" text-anchor="middle" font-weight="500">Auto Matchups</text>
    <!-- Pill 3 -->
    <rect x="367" y="0" width="155" height="40" rx="20" fill="#173404"/>
    <text x="444" y="26" font-size="16" fill="#c0dd97" text-anchor="middle" font-weight="500">Live Rankings</text>
  </g>

  <!-- URL badge bottom right -->
  <rect x="860" y="548" width="300" height="44" rx="8" fill="#173404"/>
  <text x="1010" y="576" font-size="18" fill="#639922" text-anchor="middle" font-weight="500">mexicanopadel.vercel.app</text>

  <!-- Ball -->
  <circle cx="1060" cy="180" r="36" fill="none" stroke="#639922" stroke-width="4"/>
  <path d="M 1030 165 Q 1060 150 1090 165" fill="none" stroke="#639922" stroke-width="3" stroke-linecap="round"/>
  <path d="M 1030 195 Q 1060 210 1090 195" fill="none" stroke="#639922" stroke-width="3" stroke-linecap="round"/>
</svg>
