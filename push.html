function log(m){const el=document.getElementById('log');el.style.display='block';el.textContent+=m+'\n';}
function step(n,state,msg){document.getElementById('d'+n).className='dot '+state;document.getElementById('s'+n).textContent=msg;}

async function run(){
  document.getElementById('btn').disabled=true;
  try{
    step(1,'active','Getting SHA...');
    const r1=await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/index.html`,{
      headers:{'Authorization':'token '+TOKEN,'Accept':'application/vnd.github.v3+json'}
    });
    const d1=await r1.json();
    const sha=d1.sha;
    log('SHA: '+sha);
    step(1,'done','Got SHA ✓');

    step(2,'active','Pushing index.html ('+Math.round(INDEX.length/1024)+'KB)...');
    const r2=await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/index.html`,{
      method:'PUT',
      headers:{'Authorization':'token '+TOKEN,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},
      body:JSON.stringify({message:'Make share leaderboard button bigger',content:INDEX,sha})
    });
    const d2=await r2.json();
    if(!r2.ok){step(2,'error','Failed');log(JSON.stringify(d2));return;}
    log('Commit: '+d2.commit.sha.slice(0,7));
    step(2,'done','Pushed ✓');

    step(3,'done','Done! Live at padelgames.vercel.app in ~30s ✓');
  }catch(e){log('Error: '+e.message);document.getElementById('btn').disabled=false;}
}
</script>
