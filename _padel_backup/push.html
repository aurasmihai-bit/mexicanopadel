function s(n,cls,msg){document.getElementById('d'+n).className='d '+cls;document.getElementById('s'+n).textContent=msg;}
async function run(){
  document.getElementById('btn').disabled=true;
  try{
    s(1,'active','Getting SHA...');
    const r1=await fetch(`https://api.github.com/repos/${U}/${R}/contents/${F}`,{headers:{'Authorization':'token '+T}});

    const r2=await fetch(`https://api.github.com/repos/${U}/${R}/contents/${F}`,{method:'PUT',

    log('Commit: '+j2.commit.sha.slice(0,7)); s(2,'done','Pushed ✓');
    s(3,'done','Live at padelgames.vercel.app in ~30s ✓');
  }catch(e){log('Error: '+e.message);document.getElementById('btn').disabled=false;}
}
