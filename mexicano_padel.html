<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Mexicano Padel Tournament</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5f4f0;color:#1a1a18;min-height:100vh;}
.wrap{max-width:680px;margin:0 auto;padding:1.5rem 1rem 3rem;}
h1{font-size:22px;font-weight:600;margin-bottom:4px;}
h2{font-size:18px;font-weight:600;margin-bottom:.75rem;}
h3{font-size:15px;font-weight:600;margin-bottom:.75rem;}
.sub{font-size:14px;color:#888;margin-bottom:1rem;}
.card{background:#fff;border:1px solid #e8e6e0;border-radius:12px;padding:1.25rem;margin-bottom:1rem;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem;}
.met{background:#f1efe8;border-radius:8px;padding:1rem;}
.met-l{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
.met-v{font-size:20px;font-weight:700;}
.tabbar{display:flex;border-bottom:2px solid #e8e6e0;margin-bottom:1.25rem;}
.tab{padding:10px 18px;font-size:14px;cursor:pointer;background:none;border:none;border-bottom:3px solid transparent;color:#888;font-family:inherit;margin-bottom:-2px;}
.tab.on{color:#1a1a18;border-bottom-color:#1a1a18;font-weight:600;}
.prow{display:flex;align-items:center;gap:10px;padding:9px 12px;background:#f5f4f0;border-radius:8px;margin-bottom:7px;}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;}
.rmb{margin-left:auto;background:none;border:none;cursor:pointer;color:#bbb;font-size:20px;line-height:1;}
.rmb:hover{color:#e24b4a;}
.mc{background:#fff;border:1px solid #e8e6e0;border-radius:12px;padding:1rem 1.25rem;margin-bottom:.75rem;}
.bdg{display:inline-block;padding:2px 10px;border-radius:99px;font-size:11px;font-weight:600;}
.bd{background:#d1f0c0;color:#2d6b0e;}
.bp{background:#fde8b0;color:#7a4a00;}
.bc{background:#c7e4fa;color:#0a4e8a;}
.rrow{display:grid;grid-template-columns:44px 1fr auto;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid #f0eeea;}
.rrow:last-child{border-bottom:none;}
.rnum{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;background:#f1efe8;color:#888;}
.btn{padding:8px 18px;border-radius:8px;font-size:14px;cursor:pointer;border:1px solid #d0cec8;background:#fff;font-family:inherit;color:#1a1a18;}
.btn:hover{background:#f1efe8;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btnp{background:#1a1a18!important;color:#fff!important;border-color:#1a1a18!important;}
.btnp:hover{background:#333!important;}
.btnd{border-color:#fcc!important;color:#a32d2d!important;}
.btnsm{padding:5px 13px;font-size:13px;}
input,select{padding:8px 11px;border-radius:8px;border:1px solid #d0cec8;background:#fff;font-size:14px;font-family:inherit;color:#1a1a18;outline:none;}
input:focus,select:focus{border-color:#378add;box-shadow:0 0 0 3px rgba(55,138,221,.1);}
.frow{display:flex;gap:8px;align-items:center;margin-bottom:11px;}
.frow label{font-size:13px;color:#888;width:130px;flex-shrink:0;}
.wbox{background:#fef3e0;border:1px solid #fcd97a;border-radius:8px;padding:9px 13px;font-size:13px;color:#7a4a00;margin-top:8px;}
.ibox{background:#e8f3fd;border:1px solid #b2d4f5;border-radius:8px;padding:12px 14px;font-size:13px;color:#0a4e8a;margin-bottom:1rem;line-height:1.6;}
.sbox{background:#e8f5d8;border:1px solid #a8d97a;border-radius:8px;padding:9px 14px;font-size:13px;color:#2d6b0e;margin-bottom:.75rem;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.hmatch{display:flex;align-items:center;gap:7px;font-size:13px;padding:9px 0;border-bottom:1px solid #f0eeea;}
.hmatch:last-child{border-bottom:none;}
.pbw{height:4px;background:#f1efe8;border-radius:2px;flex:1;min-width:30px;}
.pb{height:100%;border-radius:2px;background:#1a1a18;}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
var AF=['#B5D4F4','#C0DD97','#FAC775','#F4C0D1','#9FE1CB','#CECBF6','#F0997B','#5DCAA5'];
var AT=['#0C447C','#27500A','#633806','#72243E','#0F6E56','#3C3489','#993C1D','#0F6E56'];

var G={view:'setup',tab:'matches',name:'Mexicano Padel',pts:24,players:[],rounds:[],pid:1,mid:1};

function shuf(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}
function ini(n){return n.trim().split(/\s+/).map(function(w){return w[0];}).join('').substring(0,2).toUpperCase();}
function byId(id){for(var i=0;i<G.players.length;i++)if(G.players[i].id===id)return G.players[i];return null;}
function rnk(){return G.players.slice().sort(function(a,b){return b.pts-a.pts||(a.name>b.name?1:-1);});}
function cur(){return G.rounds.length?G.rounds[G.rounds.length-1]:null;}
function rdone(r){return r&&r.matches.every(function(m){return m.done;});}

function mkpairs(rp){
  var ms=[];var c=Math.floor(rp.length/4);
  for(var i=0;i<c;i++){var b=i*4;ms.push({id:G.mid++,court:i+1,t1:[rp[b].id,rp[b+2].id],t2:[rp[b+1].id,rp[b+3].id],s1:null,s2:null,done:false});}
  return ms;
}

function addP(name){
  if(!name||!name.trim())return;
  var ci=(G.pid-1)%AF.length;
  G.players.push({id:G.pid++,name:name.trim(),pts:0,fi:AF[ci],ti:AT[ci]});
  re();
}
function rmP(id){G.players=G.players.filter(function(p){return p.id!==id;});re();}
function start(){
  if(G.players.length<8)return;
  G.rounds=[{num:1,matches:mkpairs(shuf(G.players))}];
  G.view='tournament';G.tab='matches';re();
}
function saveScore(mid){
  var el=document.getElementById('si'+mid);
  if(!el)return;
  var s1=parseInt(el.value);
  if(isNaN(s1)||s1<0||s1>G.pts){alert('Enter a score between 0 and '+G.pts);return;}
  var s2=G.pts-s1;
  var r=cur();if(!r)return;
  var m=null;
  for(var i=0;i<r.matches.length;i++){if(r.matches[i].id===mid){m=r.matches[i];break;}}
  if(!m||m.done)return;
  m.s1=s1;m.s2=s2;m.done=true;
  m.t1.forEach(function(id){var p=byId(id);if(p)p.pts+=s1;});
  m.t2.forEach(function(id){var p=byId(id);if(p)p.pts+=s2;});
  re();
}
function nextRound(){
  var r=cur();if(!rdone(r))return;
  G.rounds.push({num:r.num+1,matches:mkpairs(rnk())});
  G.tab='matches';re();
}
function reset(){
  if(!confirm('Reset all scores and start over?'))return;
  G.players.forEach(function(p){p.pts=0;});
  G.rounds=[];G.view='setup';re();
}
function sample(){
  var ns=['Alex Rivera','Maria Santos','Carlos Lopez','Sofia Diaz','Pablo Martinez','Elena Garcia','Diego Torres','Laura Fernandez'];
  var ex=G.players.map(function(p){return p.name;});
  var need=Math.max(0,8-G.players.length);
  ns.filter(function(n){return ex.indexOf(n)<0;}).slice(0,need).forEach(addP);
}
function updatePreview(mid){
  var el=document.getElementById('si'+mid);
  var sp=document.getElementById('sp'+mid);
  if(!el||!sp)return;
  var v=parseInt(el.value);
  sp.textContent=(!isNaN(v)&&v>=0&&v<=G.pts)?'opponent gets '+(G.pts-v)+' pts':'';
}

function av(p,sz){
  sz=sz||32;
  return '<div class="av" style="width:'+sz+'px;height:'+sz+'px;background:'+p.fi+';color:'+p.ti+';font-size:'+Math.floor(sz*.38)+'px;">'+ini(p.name)+'</div>';
}

function setupH(){
  var n=G.players.length,ok=n>=8,w4=n>0&&n%4!==0;
  var plist=n===0
    ?'<div style="text-align:center;padding:1.5rem;color:#888;font-size:14px;">No players yet. Add at least 8 to start.</div>'
    :G.players.map(function(p){return '<div class="prow">'+av(p)+'<span style="font-size:14px;">'+p.name+'</span><button class="rmb" onclick="rmP('+p.id+')">&#215;</button></div>';}).join('');
  return '<div>'+
  '<div style="display:flex;align-items:center;gap:12px;margin-bottom:.25rem;">'+
  '<div style="width:38px;height:38px;background:#1a1a18;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">'+
  '<svg width="22" height="22" viewBox="0 0 22 22" fill="none"><circle cx="11" cy="11" r="9" stroke="#fff" stroke-width="1.5"/><ellipse cx="11" cy="11" rx="4.5" ry="9" stroke="#fff" stroke-width="1.2"/><line x1="2" y1="11" x2="20" y2="11" stroke="#fff" stroke-width="1.2"/></svg>'+
  '</div><h1>Mexicano Padel</h1></div>'+
  '<p class="sub">Friendly tournament with dynamic, ranking-based matchups</p>'+
  '<div class="card"><h3>Tournament settings</h3>'+
  '<div class="frow"><label>Name</label><input style="flex:1;" value="'+G.name+'" oninput="G.name=this.value" placeholder="My Mexicano"/></div>'+
  '<div class="frow" style="margin-bottom:0;"><label>Points per match</label>'+
  '<select onchange="G.pts=parseInt(this.value)" style="width:auto;">'+
  '<option value="16"'+(G.pts===16?' selected':'')+'>16 pts &nbsp;(~8 min)</option>'+
  '<option value="24"'+(G.pts===24?' selected':'')+'>24 pts (~12 min)</option>'+
  '<option value="32"'+(G.pts===32?' selected':'')+'>32 pts (~16 min)</option>'+
  '</select></div></div>'+
  '<div class="card">'+
  '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">'+
  '<h3 style="margin-bottom:0;">Players <span style="font-weight:400;color:#888;font-size:14px;">('+n+')</span></h3>'+
  '<button class="btn btnsm" onclick="sample()" '+(n>=8?'disabled':'')+'>+ Quick add 8</button></div>'+
  '<div style="display:flex;gap:8px;margin-bottom:1rem;">'+
  '<input id="pi" style="flex:1;" placeholder="Player name" onkeydown="if(event.key===\'Enter\'){addP(this.value);this.value=\'\';}" />'+
  '<button class="btn btnp btnsm" onclick="var e=document.getElementById(\'pi\');addP(e.value);e.value=\'\';">Add</button></div>'+
  plist+
  (n>0&&n<8?'<div class="wbox">Need at least 8 players — add '+(8-n)+' more</div>':'')+
  (w4?'<div class="wbox">Best with multiples of 4. Adding '+(4-(n%4))+' more player(s) gives full courts.</div>':'')+
  '</div>'+
  '<div class="ibox"><strong>How Mexicano works:</strong> Round 1 is drawn randomly. From round 2 onwards, rankings decide your partners and opponents — rank 1 &amp; 3 team up against rank 2 &amp; 4, rank 5 &amp; 7 face 6 &amp; 8, and so on. Points accumulate individually. The player with the highest total wins.</div>'+
  '<button class="btn btnp" style="width:100%;padding:13px;font-size:15px;" onclick="start()" '+(ok?'':'disabled')+'>Start tournament'+(n>=8?' — '+n+' players':'')+' </button></div>';
}

function mcH(m){
  var p1=byId(m.t1[0]),p2=byId(m.t1[1]),p3=byId(m.t2[0]),p4=byId(m.t2[1]);
  var n1=p1?p1.name:'?',n2=p2?p2.name:'?',n3=p3?p3.name:'?',n4=p4?p4.name:'?';
  if(m.done){
    var w=m.s1>m.s2;
    return '<div class="mc">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:11px;">'+
    '<span class="bdg bc">Court '+m.court+'</span><span class="bdg bd">Done</span></div>'+
    '<div style="display:flex;align-items:center;">'+
    '<div style="flex:1;"><div style="font-size:14px;font-weight:600;'+(w?'':'opacity:.4')+'">'+(w?'&#9679; ':'')+n1+'</div>'+
    '<div style="font-size:14px;font-weight:600;'+(w?'':'opacity:.4')+'">'+(w?'&#9679; ':'')+n2+'</div></div>'+
    '<div style="text-align:center;padding:0 16px;min-width:90px;"><div style="font-size:24px;font-weight:700;">'+m.s1+' – '+m.s2+'</div>'+
    '<div style="font-size:11px;color:#888;margin-top:2px;">points</div></div>'+
    '<div style="flex:1;text-align:right;"><div style="font-size:14px;font-weight:600;'+(!w?'':'opacity:.4')+'">'+n3+(!w?' &#9679;':'')+'</div>'+
    '<div style="font-size:14px;font-weight:600;'+(!w?'':'opacity:.4')+'">'+n4+(!w?' &#9679;':'')+'</div></div>'+
    '</div></div>';
  }
  return '<div class="mc">'+
  '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:11px;">'+
  '<span class="bdg bc">Court '+m.court+'</span><span class="bdg bp">Pending</span></div>'+
  '<div style="display:flex;align-items:center;margin-bottom:13px;">'+
  '<div style="flex:1;"><div style="font-size:14px;font-weight:600;margin-bottom:3px;">'+n1+'</div><div style="font-size:14px;font-weight:600;">'+n2+'</div></div>'+
  '<div style="padding:0 14px;color:#bbb;font-size:13px;font-weight:600;">vs</div>'+
  '<div style="flex:1;text-align:right;"><div style="font-size:14px;font-weight:600;margin-bottom:3px;">'+n3+'</div><div style="font-size:14px;font-weight:600;">'+n4+'</div></div>'+
  '</div>'+
  '<div style="border-top:1px solid #f0eeea;padding-top:11px;">'+
  '<div style="font-size:12px;color:#888;margin-bottom:8px;">Enter points for <strong>'+n1+' &amp; '+n2+'</strong> (out of '+G.pts+')</div>'+
  '<div style="display:flex;align-items:center;gap:10px;">'+
  '<input type="number" id="si'+m.id+'" min="0" max="'+G.pts+'" placeholder="0 – '+G.pts+'" style="width:90px;text-align:center;font-size:18px;font-weight:700;" oninput="updatePreview('+m.id+')"/>'+
  '<span id="sp'+m.id+'" style="font-size:13px;color:#888;"></span>'+
  '<button class="btn btnp btnsm" style="margin-left:auto;" onclick="saveScore('+m.id+')">Save score</button></div></div></div>';
}

function tournH(){
  var r=cur();if(!r)return'';
  var rd=rdone(r),rk=rnk(),mx=rk.length&&rk[0].pts?rk[0].pts:1;
  var comp=G.rounds.filter(function(x){return rdone(x);}).length;
  var body='';

  if(G.tab==='matches'){
    body='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">'+
    '<h2 style="margin-bottom:0;">Round '+r.num+'</h2>'+
    (rd?'<button class="btn btnp btnsm" onclick="nextRound()">Next round &#8594;</button>':'')+
    '</div>'+r.matches.map(mcH).join('')+
    (rd?'<div class="sbox"><span>&#10003; All matches in round '+r.num+' complete!</span>'+
    '<div style="display:flex;gap:8px;"><button class="btn btnsm" onclick="G.tab=\'rankings\';re()">See rankings</button>'+
    '<button class="btn btnp btnsm" onclick="nextRound()">Round '+(r.num+1)+'</button></div></div>':'');
  } else if(G.tab==='rankings'){
    body='<h2>Leaderboard</h2><div class="card" style="padding:.5rem 1.25rem;">'+
    rk.map(function(p,i){
      var ns=i===0?' style="background:#fac775;color:#633806;"':i===1?' style="background:#d3d1c7;color:#2c2c2a;"':i===2?' style="background:#f5c4b3;color:#4a1b0c;"':'';
      var pct=mx>0?Math.round(p.pts/mx*100):0;
      return '<div class="rrow">'+
      '<div class="rnum"'+ns+'>'+(i+1)+'</div>'+
      '<div style="display:flex;align-items:center;gap:9px;overflow:hidden;min-width:0;">'+
      av(p,28)+
      '<div style="min-width:0;flex:1;">'+
      '<div style="font-size:14px;font-weight:'+(i<3?700:400)+';white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+p.name+'</div>'+
      '<div class="pbw"><div class="pb" style="width:'+pct+'%;opacity:'+(i===0?1:.4)+';"></div></div>'+
      '</div></div>'+
      '<div style="font-size:15px;font-weight:700;white-space:nowrap;">'+p.pts+' pts</div></div>';
    }).join('')+'</div>';
  } else {
    var hrs=G.rounds.slice().reverse().map(function(rd2){
      var rms=rd2.matches.map(function(m){
        var p1=byId(m.t1[0]),p2=byId(m.t1[1]),p3=byId(m.t2[0]),p4=byId(m.t2[1]);
        var n1=p1?p1.name:'?',n2=p2?p2.name:'?',n3=p3?p3.name:'?',n4=p4?p4.name:'?';
        if(!m.done)return'<div class="hmatch" style="color:#aaa;">Ct '+m.court+' — '+n1+' / '+n2+' vs '+n3+' / '+n4+'<span class="bdg bp" style="margin-left:auto;font-size:10px;">pending</span></div>';
        var w=m.s1>m.s2;
        return'<div class="hmatch">'+
        '<span class="bdg bc" style="min-width:44px;">Ct '+m.court+'</span>'+
        '<span style="flex:1;'+(w?'font-weight:600':'color:#aaa')+'">'+n1+' / '+n2+'</span>'+
        '<span style="font-weight:700;padding:0 10px;white-space:nowrap;">'+m.s1+' – '+m.s2+'</span>'+
        '<span style="flex:1;text-align:right;'+(!w?'font-weight:600':'color:#aaa')+'">'+n3+' / '+n4+'</span></div>';
      }).join('');
      return'<div style="margin-bottom:1.25rem;"><h3>Round '+rd2.num+' '+
      '<span class="bdg '+(rdone(rd2)?'bd':'bp')+'">'+(rdone(rd2)?'Complete':'In progress')+'</span></h3>'+
      '<div class="card" style="padding:.5rem 1.25rem;">'+rms+'</div></div>';
    }).join('');
    body='<h2>Round history</h2>'+hrs;
  }

  return'<div>'+
  '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.75rem;">'+
  '<div><h1>'+G.name+'</h1>'+
  '<p class="sub" style="margin-bottom:0;">Mexicano &middot; '+G.pts+' pts/match &middot; '+G.players.length+' players &middot; '+G.rounds.length+' round(s) generated</p></div>'+
  '<button class="btn btnsm btnd" onclick="reset()">&#8635; Reset</button></div>'+
  '<div class="g2">'+
  '<div class="met"><div class="met-l">Rounds completed</div><div class="met-v">'+comp+'</div></div>'+
  '<div class="met"><div class="met-l">Current leader</div><div class="met-v" style="font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+(rk[0]?rk[0].name:'—')+'</div></div>'+
  '</div>'+
  '<div class="tabbar">'+
  '<button class="tab '+(G.tab==='matches'?'on':'')+'" onclick="G.tab=\'matches\';re()">Matches</button>'+
  '<button class="tab '+(G.tab==='rankings'?'on':'')+'" onclick="G.tab=\'rankings\';re()">Rankings</button>'+
  '<button class="tab '+(G.tab==='history'?'on':'')+'" onclick="G.tab=\'history\';re()">History</button>'+
  '</div>'+body+'</div>';
}

function re(){document.getElementById('app').innerHTML=G.view==='setup'?setupH():tournH();}
re();
</script>
</body>
</html>
